{% extends 'base.html' %}

{% block title %}Pilgrim Management - Smart Hajj Management{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Pilgrim Management</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#registrationModal">
            <i class="fas fa-plus me-1"></i> Register New Pilgrim
        </button>
    </div>
</div>

<!-- Search and Filters -->
<div class="card shadow-sm mb-4">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-6">
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fas fa-search text-muted"></i></span>
                    <input type="text" id="pilgrimSearch" class="form-control border-start-0" placeholder="Search by name, passport, or package...">
                </div>
            </div>
            <div class="col-md-3">
                <select class="form-select" id="packageFilter">
                    <option value="">All Packages</option>
                    <option value="Economy">Economy</option>
                    <option value="VIP">VIP</option>
                    <option value="Premium">Premium</option>
                </select>
            </div>
        </div>
    </div>
</div>

<!-- Pilgrim Table -->
<div class="card shadow-sm">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="pilgrimTable">
                <thead class="bg-light">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Passport</th>
                        <th>Package</th>
                        <th>Status</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody id="pilgrimTableBody">
                    <!-- Data will be loaded via JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Registration Modal -->
<div class="modal fade" id="registrationModal" tabindex="-1" aria-labelledby="registrationModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="registrationModalLabel">Pilgrim Registration</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="registrationForm" class="needs-validation" novalidate>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="fullName" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="fullName" required>
                            <div class="invalid-feedback">Please provide a name.</div>
                        </div>
                        <div class="col-md-6">
                            <label for="passportNumber" class="form-label">Passport Number</label>
                            <input type="text" class="form-control" id="passportNumber" required>
                        </div>
                        <div class="col-md-6">
                            <label for="cnicNumber" class="form-label">CNIC Number</label>
                            <input type="text" class="form-control" id="cnicNumber" placeholder="00000-0000000-0" required>
                        </div>
                        <div class="col-md-6">
                            <label for="packageType" class="form-label">Hajj Package</label>
                            <select class="form-select" id="packageType" required>
                                <option value="" selected disabled>Choose...</option>
                                <option value="Economy">Economy</option>
                                <option value="VIP">VIP</option>
                                <option value="Premium">Premium</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="contactNumber" class="form-label">Contact Number</label>
                            <input type="text" class="form-control" id="contactNumber" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Pilgrim</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Edit Pilgrim Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="editModalLabel"><i class="fas fa-user-edit me-2"></i> Edit Pilgrim Details</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="editForm" class="needs-validation" novalidate>
                <input type="hidden" id="editPilgrimId">
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="editFullName" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="editFullName" required>
                        </div>
                        <div class="col-md-6">
                            <label for="editPassportNumber" class="form-label">Passport Number</label>
                            <input type="text" class="form-control" id="editPassportNumber" required>
                        </div>
                        <div class="col-md-6">
                            <label for="editPackageType" class="form-label">Hajj Package</label>
                            <select class="form-select" id="editPackageType" required>
                                <option value="Economy">Economy</option>
                                <option value="VIP">VIP</option>
                                <option value="Premium">Premium</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="editContactNumber" class="form-label">Contact Number</label>
                            <input type="text" class="form-control" id="editContactNumber" required>
                        </div>
                        <div class="col-md-6">
                            <label for="editStatus" class="form-label">Payment Status</label>
                            <select class="form-select" id="editStatus" required>
                                <option value="Paid">Paid</option>
                                <option value="Partial">Partial</option>
                                <option value="Pending">Pending</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Update Records</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/pilgrims.js') }}"></script>
{% endblock %}
