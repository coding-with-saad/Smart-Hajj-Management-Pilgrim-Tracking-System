<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hajj System - ALKHAMS</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --primary-glow: #0d6efd;
        }

        body {
            /* High-quality background image of Kaaba with Tawaf */
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), 
                        url('https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* Unique Glassmorphism Card */
        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            color: white;
            animation: cardEntrance 1s ease-out;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header .icon-box {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--glass-border);
            color: #ffd700; /* Golden icon for premium feel */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 3rem;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            transition: all 0.5s;
        }

        .login-header .icon-box:hover {
            transform: rotateY(180deg);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
        }

        .login-header h2 {
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .project-title {
            font-size: 0.9rem;
            color: #0dcaf0;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .tagline {
            font-style: italic;
            font-weight: 300;
            opacity: 0.8;
            font-size: 0.85rem;
        }

        .form-label {
            font-weight: 500;
            font-size: 0.9rem;
            margin-left: 0.5rem;
        }

        .input-group {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            transition: all 0.3s;
        }

        .input-group:focus-within {
            border-color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .input-group-text {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            padding-left: 1.2rem;
        }

        .form-control {
            background: transparent !important;
            border: none !important;
            color: white !important;
            padding: 0.8rem 1.2rem;
            font-weight: 300;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-control:focus {
            box-shadow: none;
        }

        .btn-login {
            background: linear-gradient(45deg, #0d6efd, #00d2ff);
            border: none;
            padding: 0.8rem;
            border-radius: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(13, 110, 253, 0.4);
            filter: brightness(1.1);
        }

        #togglePassword {
            cursor: pointer;
            padding-right: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .footer-text {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* Animation for alerts */
        .alert {
            background: rgba(220, 53, 69, 0.2);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ffbaba;
            border-radius: 1rem;
        }
    </style>
</head>
<body>

    <div class="login-card shadow-lg">
        <div class="login-header">
            <div class="project-title">Smart Hajj Management System</div>
            <div class="icon-box">
                <i class="fas fa-kaaba"></i>
            </div>
            <h2>ALKHAMS</h2>
            <p class="tagline">"Your Spiritual Journey, Our Sacred Responsibility."</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i> {{ message }}
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label">Administrator ID</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user-shield"></i></span>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required autocomplete="off">
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Access Key</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-key"></i></span>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter access key" required>
                    <span class="input-group-text" id="togglePassword">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </span>
                </div>
            </div>
            <button type="submit" class="btn btn-login w-100">Secure Sign In <i class="fas fa-arrow-right ms-2"></i></button>
        </form>

        <div class="footer-text">
            &copy; 2026 ALKHAMS Agency | Advanced Pilgrim Tracking
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
